name: Bug Report
description: Report a bug in the concierge tool
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
      placeholder: The browse command crashes when filtering by skill.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `concierge browse --skill security`
        2. Observe traceback
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: A filtered table of security-related bounties.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or tracebacks.
      placeholder: |
        Traceback (most recent call last):
          File "...", line 42, in browse
        KeyError: 'skill'
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: >
        OS, Python version, concierge version, or anything else relevant.
      placeholder: "Ubuntu 24.04, Python 3.11, concierge 0.1.0"
    validations:
      required: false
