name: Bounty Question
description: Ask about bounties, payouts, or the tech stack
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: How do epoch settlements work?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: >
        Which bounty, repository, or concept does this relate to?
        Include issue numbers, repo names, or links if applicable.
      placeholder: |
        Related to rustchain-bounties #491 (RIP-201 Fleet Detection Bypass).
        I am trying to understand how fleet scoring works before attempting
        the red-team challenge.
    validations:
      required: false
