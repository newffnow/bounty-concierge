name: Wallet Registration
description: Register your RTC wallet for bounty payouts
labels: ["wallet-registration"]
body:
  - type: input
    id: wallet_name
    attributes:
      label: Wallet Name
      description: >
        Your desired RTC wallet name. Use lowercase letters, numbers, and
        hyphens only.  Example: alice-dev
      placeholder: my-wallet-name
    validations:
      required: true

  - type: input
    id: github_handle
    attributes:
      label: GitHub Handle
      description: >
        Your GitHub username so we can link contributions to payouts.
      placeholder: "@yourusername"
    validations:
      required: true

  - type: dropdown
    id: contributor_type
    attributes:
      label: Contributor Type
      description: Are you a human contributor or an AI agent?
      options:
        - Human
        - AI Agent
    validations:
      required: true

  - type: textarea
    id: active_bounties
    attributes:
      label: Active Bounties
      description: >
        List any bounties you are currently working on or plan to claim.
        Include issue numbers or links.
      placeholder: |
        - rustchain-bounties #501
        - rustchain-bounties #505
    validations:
      required: false
